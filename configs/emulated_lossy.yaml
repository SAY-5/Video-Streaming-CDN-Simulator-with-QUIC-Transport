name: emulated-lossy
description: Real QUIC vs TCP through netem-shaped Docker network
mode: emulated
seed: 20260409

emulated:
  edges:
    - id: edge-sg
      h2_url: https://172.22.0.30:8443
      h3_url: https://172.22.0.30:8444
    - id: edge-mumbai
      h2_url: https://172.22.0.40:8443
      h3_url: https://172.22.0.40:8444
  ca_cert_path: /app/certs/ca.crt
  netem_profile: lossy

# These fields still required by the schema even in emulated mode.
topology:
  origin_location: { latitude: 38.9, longitude: -77.0 }
  origin_network:
    base_rtt_ms: 50
    bandwidth_mbps: 100
    loss_model: { type: none }
  edges:
    - id: edge-sg
      geo_tag: asia
      latitude: 1.35
      longitude: 103.82
      capacity: 1000
      client_profile:
        base_rtt_ms: 20
        bandwidth_mbps: 50
        loss_model: { type: none }
      network_to_origin:
        base_rtt_ms: 50
        bandwidth_mbps: 100
        loss_model: { type: none }
    - id: edge-mumbai
      geo_tag: asia
      latitude: 19.07
      longitude: 72.87
      capacity: 1000
      client_profile:
        base_rtt_ms: 30
        bandwidth_mbps: 50
        loss_model: { type: none }
      network_to_origin:
        base_rtt_ms: 60
        bandwidth_mbps: 100
        loss_model: { type: none }

content:
  catalog_size: 20
  zipf_alpha: 1.1
  duration_seconds: 16
  segment_seconds: 4

clients:
  count: 8
  policy: latency_based
  geos: [asia]

protocols: [tcp-h2, quic-h3]
abr: buffer_based

cache:
  type: lru
  size_bytes: 134217728

quic_settings:
  zero_rtt_rate: 0.85

playback:
  prefetch_depth: 3

runs: 3

output:
  dir: /results/emulated_lossy
  emit_csv: true
  emit_json: true
