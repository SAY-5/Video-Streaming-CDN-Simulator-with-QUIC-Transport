name: loss-rtt-sweep
description: Cross-product of loss rates and RTTs to find QUIC's advantage surface.
output_dir: results/sweep_loss_rtt

parameters:
  - name: loss_pct
    path: topology.edges[*].client_profile.loss_model.uniform_percent
    values: [0, 1, 3, 5, 7]
  - name: rtt_ms
    path: topology.edges[*].client_profile.base_rtt_ms
    values: [20, 50, 100, 200]

base:
  name: sweep-base
  description: Base config for the loss/RTT sweep.
  seed: 20260409
  topology:
    origin_location: { latitude: 38.9, longitude: -77.0 }
    origin_network:
      base_rtt_ms: 50
      bandwidth_mbps: 1000
      loss_model: { type: none }
    edges:
      - id: edge-1
        geo_tag: asia
        latitude: 1.35
        longitude: 103.82
        capacity: 500
        client_profile:
          base_rtt_ms: 50
          bandwidth_mbps: 25
          loss_model: { type: uniform, uniform_percent: 0 }
        network_to_origin:
          base_rtt_ms: 50
          bandwidth_mbps: 1000
          loss_model: { type: none }
  content:
    catalog_size: 30
    zipf_alpha: 1.1
    duration_seconds: 30
    segment_seconds: 4
  clients:
    count: 100
    policy: latency_based
    geos: [asia]
  protocols: [tcp-h2, quic-h3]
  abr: buffer_based
  cache:
    type: arc
    size_bytes: 268435456
  quic_settings:
    zero_rtt_rate: 0.85
  playback:
    prefetch_depth: 3
  runs: 5
  output:
    dir: results/sweep_loss_rtt
    emit_csv: false
    emit_json: true
